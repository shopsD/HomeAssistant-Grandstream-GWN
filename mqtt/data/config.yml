mqtt:
  port: 1883 # default 1883
  host: HOST_OR_IP # default 127.0.0.1
  password: CHANGE_ME # default None
  username: CHANGE_ME # default None
  keepalive: 60 # default 60
  topic: "gwn" # default gwn
  # client_id: # default None
  # tls: False # default false
  # verify_tls: True # default true
gwn:
  url: https://localhost:8443 # default https://localhost:8443
  app_id: CHANGE_ME
  secret_key: CHANGE_ME
  # page_size: 5 # default 5
  # max_pages: 100 # default 100 (set to -1 for unlimited)
  # refresh_period_s: 30 # the rate to poll the GWN Manager for all data
logging:
  level: DEBUG # default INFO
  location: syslog # syslog/file/console default: syslog
  #size: 10000 # number of log entries before rotation: default 0 (no rotation)
  #files: 1 # number of files to keep on disk before rotation: default 1 (no rotation)