app:
  publish_every_poll: False # default False. If set to True then MQTT will publish a message every time a GWN poll is performed. If set to False, then MQTT message are only published when data changes in GWN
mqtt:
  port: 1883 # default 1883
  host: HOST_OR_IP # default 127.0.0.1
  password: CHANGE_ME # default None
  username: CHANGE_ME # default None
  keepalive: 60 # default 60
  topic: "gwn" # default gwn
  # client_id: # default None
  # tls: False # default false
  # verify_tls: True # default true
  homeassistant: # controls support for home assistant auto discovery
    # Regarding the 'always_publish_autodiscovery' If this is False, then autodiscovery is published only on application start. If set to True then every payload
    # update will publish autodiscovery. This only applies to Networks, Devices and SSIDs that have autodiscovery enabled via ther other config options
    always_publish_autodiscovery: False # default False. 
    application_autodiscovery: False # default False. This will prevent this application (GWN to MQTT) from having auto discovery in home assistant.
    default_network_autodiscovery: False # default False. This will not support home assistant auto discovery for networks that are not otherwise specified below
    default_device_autodiscovery: False # default False. This will not support home assistant auto discovery for devices that are not otherwise specified below
    default_ssid_autodiscovery: False # default False. This will not support home assistant auto discovery for ssids that are not otherwise specified below
    # the options below determine the format of the message. If not specified, then the default above is applied
    network_autodiscovery: # default is empty so all networks will use the default_network_autodiscovery rules for publishing home assistant style data
      - 1 # will use default_network_autodiscovery as the default
      - 2: True
    device_autodiscovery: # default is empty so all devices will use default_device_autodiscovery rules for publishing home assistant style data
      - "AA:BB:CC:DD:EE:FF": False
      - "AA:BB:CC:DD:EE:f0": True
    ssid_autodiscovery: # default is empty so all payloads will use default_ssid_autodiscovery rules for publishing home assistant style data
      - 3: False
      - 2: False
    network_name_override: # will override the network name used in Home Assistant with this value
      - 1: "New Name"
      - 2: "New Name"
    device_name_override: # will override the device name used in Home Assistant with this value
      - "AA:BB:CC:DD:EE:FF": "New Name"
      - "AA:BB:CC:DD:EE:f0": "New Name"
    ssid_name_override: # will override the ssid name used in Home Assistant with this value
      - 1: "New Name"
      - 2: "New Name"
  no_publish: False # default False. Listens to MQTT messages but will not publish anything to MQTT. Good for monitoring logs for application data. Primarily a dev/debug setting
gwn: # required
  url: https://localhost:8443 # default https://localhost:8443
  app_id: CHANGE_ME # required
  secret_key: CHANGE_ME # required
  # username: CHANGE_ME # optional (required if password is specified) This is the username for logging into GWN Manager. Required for associating SSIDs to Devices
  # password: CHANGE_ME # optional (required if username is specified) This is the password for logging into GWN Manager. Required for associating SSIDs to Devices
  # page_size: 5 # default 10
  # max_pages: 100 # default 0 (set to 0 for unlimited)
  # refresh_period_s: 30 # the rate to poll the GWN Manager for all data
  # exclude_ssid: # list of ssids by ID to exclude
  #   - 1
  #   - 2
  # exclude_passphrase: # list of ssids by ID to not publish the WPA/WEP passphrase. NOTE: When editing an SSID, a passphrase MUST be provided
  #   - 3
  #   - 4
  #   - 5
  # exclude_device: # devices that will not be processed or published. default is empty
  #   - "AA:BB:CC:DD:EE:FF"
  #   - "AA:BB:CC:DD:EE:F0"
  # exclude_network: # networks that will not be processed or published. default is empty
  #   - 1
  #   - 2

  # Regarding 'ignore_failed_fetch_before_update' When performing an update of SSIDs, Devices and Networks, the application fetches the latest data to build a payload incase some unmodfiied
  # data is required in the payload. If this is set to True and the pre-update fetch fails, then it will still perform the updating passing None/null to the required fields that have not been
  # modified. If set to False, then if the pre-update fetch fails, it will cancel the update and log 
  ignore_failed_fetch_before_update: False # default False. Useful if using an external MQTT message creation application instead of Home Assistant
  # Regarding 'ssid_name_to_device_binding' If set to true and no username/password credentials are provided, then the system will match SSIDs to devices via SSID name. 
  # When duplicate SSIDs are found, the last one added to the device is ignored. Has no effect if username and password are provided. If this is false and username and
  # password is not provided, then updating the SSIDs or Devices will not be possible unless the 'ignore_failed_fetch_before_update' is True
  ssid_name_to_device_binding: True # default True. Useful if using an external MQTT message creation application instead of Home Assistant
  no_publish: False # default False. Polls for data from GWN Manager but does not send commands. Good for monitoring logs for application data. Primarily a dev/debug setting
logging:
  level: DEBUG # default INFO
  location: syslog # syslog/file/console default: syslog
  #size: 10000 # number of log entries before rotation: default 0 (no rotation)
  #files: 1 # number of files to keep on disk before rotation: default 1 (no rotation)