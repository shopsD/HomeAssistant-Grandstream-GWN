name: python-checker

on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Load project metadata
      id: meta
      run: |
        echo "python_version=$(python -c 'from meta_data.project_meta import PYTHON_VERSION; print(PYTHON_VERSION)')" >> "$GITHUB_OUTPUT"

    - name: Set up Python ${{ steps.meta.outputs.python_version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ steps.meta.outputs.python_version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
    - name: Setup Environment
      run: |
        uv sync --extra ha --dev
    - name: Analysing the code with Ruff
      run: |
        uv run ruff check .
    - name: Analysing the code with Mypy
      run: |
        uv run mypy custom_components/grandstream_gwn/ gwn/ mqtt/ meta_data/
