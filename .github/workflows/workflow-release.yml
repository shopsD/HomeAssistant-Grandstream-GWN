name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Custom tag/version to override the fixed one. e.g. v1.2.3 or 1.2.3
        required: false
        type: string
      name:
        description: Release title
        required: true
        type: string
      body:
        description: Release notes
        required: false
        type: string
      overwrite:
        description: Overwrite existing release/tag
        required: true
        type: boolean
        default: false
      prerelease:
        description: Mark as prerelease
        required: true
        type: boolean
        default: false
      publish_wheel:
        description: Publish wheel asset
        required: true
        type: boolean
        default: false
      publish_docker:
        description: Publish docker image
        required: true
        type: boolean
        default: false
      publish_latest:
        description: Publishes the image with a latest tag
        required: false
        type: boolean
        default: true
      publish_hacs:
        description: Publish HACS zip
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load project metadata
        id: meta
        run: |
          APP_VERSION="$(python -c 'from meta_data.project_meta import APP_VERSION; print(APP_VERSION)')"

          if [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
            VERSION="${VERSION#v}"
            TAG="${{ inputs.tag }}"
          else
            VERSION="${APP_VERSION}"
            TAG="${APP_VERSION}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Validate release mode
        if: ${{ inputs.tag != '' && !inputs.publish_wheel && !inputs.publish_docker && !inputs.publish_hacs }}
        run: |
          echo "A custom tag override requires at least one publish workflow so the workspace-only version override is reflected in a built artifact."
          exit 1

      - name: Recreate tag if requested
        if: ${{ inputs.overwrite }}
        run: |
          git tag -d "${{ steps.meta.outputs.tag }}"
          git push origin ":refs/tags/${{ steps.meta.outputs.tag }}"

      - name: Create tag if missing
        run: |
          git tag "${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Delete existing release if overwrite requested
        if: ${{ inputs.overwrite }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ steps.meta.outputs.tag }}" --yes

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ inputs.name }}" \
            --notes "${{ inputs.body }}" \
            ${PRERELEASE_FLAG}

  wheel:
    needs: release
    if: ${{ inputs.publish_wheel }}
    uses: ./.github/workflows/workflow-wheel.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
      version: ${{ needs.release.outputs.version }}
    secrets: inherit

  docker:
    needs: release
    if: ${{ inputs.publish_docker }}
    uses: ./.github/workflows/workflow-docker.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
      version: ${{ needs.release.outputs.version }}
      publish_latest: ${{ inputs.publish_latest }}
    secrets: inherit

  hacs:
    needs: release
    if: ${{ inputs.publish_hacs }}
    uses: ./.github/workflows/workflow-hacs.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
