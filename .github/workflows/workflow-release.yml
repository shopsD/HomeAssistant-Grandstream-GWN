name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Custom tag/version to override the fixed one. e.g. v1.2.3 or 1.2.3
        required: false
        type: string
      name:
        description: Release title
        required: true
        type: string
      body:
        description: Release notes
        required: false
        type: string
      overwrite:
        description: Overwrite existing release/tag
        required: true
        type: boolean
        default: false
      prerelease:
        description: Mark as prerelease
        required: true
        type: boolean
        default: false
      publish_mqtt:
        description: Publish mqtt asset
        required: true
        type: boolean
        default: false
      publish_mqtt_wheel:
        description: Publishes creates and publishes a wheel alongside the mqtt package. Ignored if publish_mqtt is unchecked
        required: true
        type: boolean
        default: true
      publish_gwn:
        description: Publish standalone gwn asset
        required: true
        type: boolean
        default: false
      publish_gwn_wheel:
        description: Publishes creates and publishes a wheel alongside the gwn package. Ignored if publish_gwn is unchecked
        required: true
        type: boolean
        default: true
      publish_docker:
        description: Publish docker image
        required: true
        type: boolean
        default: false
      publish_latest:
        description: Publishes the image with a latest tag
        required: false
        type: boolean
        default: true
      publish_hacs:
        description: Publish HACS zip
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load project metadata
        id: meta
        run: |
          APP_VERSION="$(python -c 'from meta_data.project_meta import APP_VERSION; print(APP_VERSION)')"
          RELEASE_TARGETS=""

          if [ "${{ inputs.publish_docker }}" = "true" ]; then
            RELEASE_TARGETS="${RELEASE_TARGETS}D"
          fi
          if [ "${{ inputs.publish_gwn }}" = "true" ]; then
            RELEASE_TARGETS="${RELEASE_TARGETS}L"
          fi
          if [ "${{ inputs.publish_hacs }}" = "true" ]; then
            RELEASE_TARGETS="${RELEASE_TARGETS}H"
          fi
          if [ "${{ inputs.publish_mqtt }}" = "true" ]; then
            RELEASE_TARGETS="${RELEASE_TARGETS}A"
          fi

          if [ -n "${{ inputs.tag }}" ]; then
            METADATA_VERSION="${{ inputs.tag }}"
          else
            METADATA_VERSION="${APP_VERSION}"
          fi

          TAG="${METADATA_VERSION}"
          RELEASE_TAG="${TAG}"
          if [ -n "${RELEASE_TARGETS}" ]; then
            RELEASE_TAG="${TAG}-${RELEASE_TARGETS}"
          fi

          echo "version=${METADATA_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
      - name: Validate Source only Settings
        run: |
          if [ -n "${{ inputs.tag }}" ] && [ "${{ inputs.publish_docker }}" != "true" ] && [ "${{ inputs.publish_mqtt }}" != "true" ] && [ "${{ inputs.publish_gwn }}" != "true" ] && [ "${{ inputs.publish_hacs }}" != "true" ]; then
            echo "Custom Tags not supported on source only releases"
            exit 1
          fi
      - name: Validate Python package version
        if: ${{ inputs.publish_docker || inputs.publish_mqtt || inputs.publish_gwn }}
        env:
          APP_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          python - <<'PY'
          import os

          try:
              from packaging.version import InvalidVersion, Version
          except ImportError:
              from setuptools._vendor.packaging.version import InvalidVersion, Version

          version = os.environ["APP_VERSION"]
          try:
              Version(version)
          except InvalidVersion as exc:
              raise SystemExit(
                  f'Wheel publishing requires a valid Python package version. '
                  f'APP_VERSION="{version}" is not valid for pyproject.toml packaging metadata.'
              ) from exc
          PY

      - name: Recreate tag if requested
        if: ${{ inputs.overwrite }}
        run: |
          if git rev-parse "${{ steps.meta.outputs.release_tag }}" >/dev/null 2>&1; then
            git tag -d "${{ steps.meta.outputs.release_tag }}"
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.meta.outputs.release_tag }}" >/dev/null 2>&1; then
            git push origin ":refs/tags/${{ steps.meta.outputs.release_tag }}"
          fi

      - name: Create tag if missing
        run: |
          git tag "${{ steps.meta.outputs.release_tag }}"
          git push origin "${{ steps.meta.outputs.release_tag }}"

      - name: Delete existing release if overwrite requested
        if: ${{ inputs.overwrite }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.meta.outputs.release_tag }}" >/dev/null 2>&1; then
            gh release delete "${{ steps.meta.outputs.release_tag }}" --yes
          fi

      - name: Setup Release Notes
        id: release_notes
        run: |
          RELEASE_ITEMS=()

          if [ "${{ inputs.publish_mqtt }}" = "true" ]; then
            RELEASE_ITEMS+=("MQTT-Bridge")
          fi
          if [ "${{ inputs.publish_gwn }}" = "true" ]; then
            RELEASE_ITEMS+=("GWN-Library")
          fi
          if [ "${{ inputs.publish_docker }}" = "true" ]; then
            RELEASE_ITEMS+=("Docker")
          fi
          if [ "${{ inputs.publish_hacs }}" = "true" ]; then
            RELEASE_ITEMS+=("HA-Integration")
          fi

          if [ ${#RELEASE_ITEMS[@]} -eq 0 ]; then
            RELEASE_ITEMS_LINE="Release Items: Source-Only"
          else
            RELEASE_ITEMS_LINE="Release Items: $(IFS=', '; echo "${RELEASE_ITEMS[*]}")"
          fi
          echo "release_items_line=${RELEASE_ITEMS_LINE}" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ steps.meta.outputs.release_tag }}" \
            --title "${{ inputs.name }}" \
            --notes "${{ inputs.body }}" \
            ${PRERELEASE_FLAG}

  mqtt-artifact:
    needs: release
    if: ${{ inputs.publish_mqtt }}
    uses: ./.github/workflows/workflow-mqtt.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
      release_tag: ${{ needs.release.outputs.release_tag }}
      version: ${{ needs.release.outputs.version }}
      create_wheel: ${{ inputs.publish_mqtt_wheel }}
    secrets: inherit

  gwn-artifact:
    needs: release
    if: ${{ inputs.publish_gwn }}
    uses: ./.github/workflows/workflow-gwn.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
      release_tag: ${{ needs.release.outputs.release_tag }}
      version: ${{ needs.release.outputs.version }}
      create_wheel: ${{ inputs.publish_gwn_wheel }}
    secrets: inherit

  docker:
    needs: release
    if: ${{ inputs.publish_docker }}
    uses: ./.github/workflows/workflow-docker.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
      release_tag: ${{ needs.release.outputs.release_tag }}
      version: ${{ needs.release.outputs.version }}
      publish_latest: ${{ inputs.publish_latest }}
      push_image: True
    secrets: inherit

  hacs:
    needs: release
    if: ${{ inputs.publish_hacs }}
    uses: ./.github/workflows/workflow-hacs.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
      release_tag: ${{ needs.release.outputs.release_tag }}
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
