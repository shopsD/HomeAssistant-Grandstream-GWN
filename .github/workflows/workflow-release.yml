name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Custom tag/version to override the fixed one. e.g. v1.2.3 or 1.2.3
        required: false
        type: string
      name:
        description: Release title
        required: true
        type: string
      body:
        description: Release notes
        required: false
        type: string
      overwrite:
        description: Overwrite existing release/tag
        required: true
        type: boolean
        default: false
      prerelease:
        description: Mark as prerelease
        required: true
        type: boolean
        default: false
      publish_mqtt_wheel:
        description: Publish mqtt wheel asset (with required imports)
        required: true
        type: boolean
        default: false
      publish_gwn_wheel:
        description: Publish standalone gwn wheel asset
        required: true
        type: boolean
        default: false
      publish_docker:
        description: Publish docker image
        required: true
        type: boolean
        default: false
      publish_latest:
        description: Publishes the image with a latest tag
        required: false
        type: boolean
        default: true
      publish_hacs:
        description: Publish HACS zip
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load project metadata
        id: meta
        run: |
          APP_VERSION="$(python -c 'from meta_data.project_meta import APP_VERSION; print(APP_VERSION)')"

          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
            METADATA_VERSION="${TAG}"
          else
            TAG="${APP_VERSION}"
            METADATA_VERSION="${APP_VERSION}"
          fi

          echo "version=${METADATA_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Validate Python package version
        if: ${{ inputs.publish_mqtt_wheel || inputs.publish_gwn_wheel }}
        env:
          APP_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          python - <<'PY'
          import os

          try:
              from packaging.version import InvalidVersion, Version
          except ImportError:
              from setuptools._vendor.packaging.version import InvalidVersion, Version

          version = os.environ["APP_VERSION"]
          try:
              Version(version)
          except InvalidVersion as exc:
              raise SystemExit(
                  f'Wheel publishing requires a valid Python package version. '
                  f'APP_VERSION="{version}" is not valid for pyproject.toml packaging metadata.'
              ) from exc
          PY

      - name: Recreate tag if requested
        if: ${{ inputs.overwrite }}
        run: |
          if git rev-parse "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            git tag -d "${{ steps.meta.outputs.tag }}"
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            git push origin ":refs/tags/${{ steps.meta.outputs.tag }}"
          fi

      - name: Create tag if missing
        run: |
          git tag "${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Delete existing release if overwrite requested
        if: ${{ inputs.overwrite }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            gh release delete "${{ steps.meta.outputs.tag }}" --yes
          fi

      - name: Setup Release Notes
        id: release_notes
        run: |
          RELEASE_ITEMS=()

          if [ "${{ inputs.publish_mqtt_wheel }}" = "true" ]; then
            RELEASE_ITEMS+=("MQTT-Bridge")
          fi
          if [ "${{ inputs.publish_gwn_wheel }}" = "true" ]; then
            RELEASE_ITEMS+=("GWN-Library")
          fi
          if [ "${{ inputs.publish_docker }}" = "true" ]; then
            RELEASE_ITEMS+=("Docker")
          fi
          if [ "${{ inputs.publish_hacs }}" = "true" ]; then
            RELEASE_ITEMS+=("HA-Integration")
          fi

          if [ ${#RELEASE_ITEMS[@]} -eq 0 ]; then
            RELEASE_ITEMS_LINE="Release Items: Source-Only"
          else
            RELEASE_ITEMS_LINE="Release Items: $(IFS=', '; echo "${RELEASE_ITEMS[*]}")"
          fi
          echo "release_items_line=${RELEASE_ITEMS_LINE}" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          RELEASE_BODY="${{ steps.release_notes.outputs.release_items_line }}<br/>${{ inputs.body }}"
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ inputs.name }}" \
            --notes "${RELEASE_BODY}" \
            ${PRERELEASE_FLAG}

  mqtt-wheel:
    needs: release
    if: ${{ inputs.publish_mqtt_wheel }}
    uses: ./.github/workflows/workflow-mqtt-wheel.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
      version: ${{ needs.release.outputs.version }}
    secrets: inherit

  gwn-wheel:
    needs: release
    if: ${{ inputs.publish_gwn_wheel }}
    uses: ./.github/workflows/workflow-gwn-wheel.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
      version: ${{ needs.release.outputs.version }}
    secrets: inherit

  docker:
    needs: release
    if: ${{ inputs.publish_docker }}
    uses: ./.github/workflows/workflow-docker.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
      version: ${{ needs.release.outputs.version }}
      publish_latest: ${{ inputs.publish_latest }}
    secrets: inherit

  hacs:
    needs: release
    if: ${{ inputs.publish_hacs }}
    uses: ./.github/workflows/workflow-hacs.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
