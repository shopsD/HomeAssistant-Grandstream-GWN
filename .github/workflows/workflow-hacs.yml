name: HACS

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      version:
        required: true
        type: string

permissions:
  contents: write

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply version override to workspace metadata
        env:
          APP_VERSION_OVERRIDE: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("meta_data/project_meta.py")
          text = path.read_text(encoding="utf-8")
          new_text, count = re.subn(
              r'^APP_VERSION = "[^"]+"$',
              f'APP_VERSION = "{os.environ["APP_VERSION_OVERRIDE"]}"',
              text,
              flags=re.MULTILINE,
          )
          if count != 1:
              raise RuntimeError("Failed to update APP_VERSION in meta_data/project_meta.py")
          path.write_text(new_text, encoding="utf-8")
          PY
          python meta_data/sync_meta.py

      - name: Load HACS archive filename
        id: hacs
        run: |
          HACS_FILENAME="$(python -c 'import json; print(json.load(open("hacs.json", encoding="utf-8"))["filename"])')"
          echo "filename=${HACS_FILENAME}" >> "$GITHUB_OUTPUT"

      - name: Build HACS zip
        run: |
          mkdir -p dist/hacs/custom_components
          cp -R custom_components/grandstream_gwn dist/hacs/custom_components/
          mkdir -p dist/hacs/custom_components/grandstream_gwn/gwn
          cp -R gwn/* dist/hacs/custom_components/grandstream_gwn/gwn/
          cd dist/hacs
          zip -r "../${{ steps.hacs.outputs.filename }}" custom_components

      - name: Upload asset to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.tag }}" "dist/${{ steps.hacs.outputs.filename }}" --clobber
