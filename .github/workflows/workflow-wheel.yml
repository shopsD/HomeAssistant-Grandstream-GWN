name: release-build

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag to upload artifacts to"
        required: true
        type: string
      version:
        description: "Application version to write into workspace metadata before building"
        required: true
        type: string
      create_wheel:
        description: "Create a wheel for the MQTT Application"
        required: true
        default: true
        type: boolean
      zip_ha_integration:
        description: "Create an archive of the Home Assistant Integration"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    name: release-build

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Apply version override to workspace metadata
      env:
        APP_VERSION_OVERRIDE: ${{ inputs.version }}
      run: |
        python - <<'PY'
        import os
        import re
        from pathlib import Path

        path = Path("meta_data/project_meta.py")
        text = path.read_text(encoding="utf-8")
        new_text, count = re.subn(
            r'^APP_VERSION = "[^"]+"$',
            f'APP_VERSION = "{os.environ["APP_VERSION_OVERRIDE"]}"',
            text,
            flags=re.MULTILINE,
        )
        if count != 1:
            raise RuntimeError("Failed to update APP_VERSION in meta_data/project_meta.py")
        path.write_text(new_text, encoding="utf-8")
        PY
        python meta_data/sync_meta.py

    - name: Load project metadata
      id: meta
      run: |
        APP_VERSION="$(python -c 'from meta_data.project_meta import APP_VERSION; print(APP_VERSION)')"
        PYTHON_VERSION="$(python -c 'from meta_data.project_meta import PYTHON_VERSION; print(PYTHON_VERSION)')"
        echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
        echo "python_version=${PYTHON_VERSION}" >> "$GITHUB_OUTPUT"

    - name: Set up Python ${{ steps.meta.outputs.python_version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ steps.meta.outputs.python_version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv

    - name: Check GitHub CLI
      run: |
        if ! command -v gh >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y gh
        fi

    - name: Prepare artifact directory
      run: mkdir -p release-assets

    - name: Create default MQTT bridge archive
      run: |
        tar -czf "release-assets/mqtt-bridge-${{ inputs.tag }}.tar.gz" \
          gwn \
          mqtt \
          README.md \
          pyproject.toml \
          uv.lock \
          LICENSE-BSD3.md \
          LICENSE-MPL.md

    - name: Build wheel
      if: ${{ inputs.create_wheel }}
      run: |
        uv build --wheel
        cp dist/*.whl release-assets/

    - name: Create Home Assistant integration archive
      if: ${{ inputs.zip_ha_integration }}
      run: |
        tar -czf "release-assets/homeassistant-integration-${{ inputs.tag }}.tar.gz" \
          gwn \
          custom_components \
          pyproject.toml \
          uv.lock \
          README.md \
          LICENSE-BSD3.md \
          LICENSE-MPL.md

    - name: List generated artifacts
      run: ls -lah release-assets

    - name: Upload artifacts to GitHub release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload "${{ inputs.tag }}" release-assets/* --clobber
