name: release-build

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publishes all generated artifacts to the Github release"
        required: true
        default: true
        type: boolean
      allow_overwrite:
        description: "Allows a release to be overwritten if it already exists, if it exists and this is false then the workflow will fail"
        required: false
        default: false
        type: boolean
      create_wheel:
        description: "Create a wheel for the MQTT Application"
        required: true
        default: true
        type: boolean
      version_tag:
        description: "Version to tag this release and override the default version"
        required: false
        type: string
      release_info:
        description: "Information on what the release contains"
        required: true
        type: string
      zip_ha_integration:
        description: "Create an archive of the Home Assistant Integration"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    name: release-build

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Load project metadata
      id: meta
      run: |
        APP_VERSION="$(python -c 'from meta_data.project_meta import APP_VERSION; print(APP_VERSION)')"
        PYTHON_VERSION="$(python -c 'from meta_data.project_meta import PYTHON_VERSION; print(PYTHON_VERSION)')"
        echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
        echo "python_version=${PYTHON_VERSION}" >> "$GITHUB_OUTPUT"

        if [ -n "${{ inputs.version_tag }}" ]; then
          VERSION_TAG="${{ inputs.version_tag }}"
        else
          VERSION_TAG="${APP_VERSION}"
        fi
        echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

    - name: Set up Python ${{ steps.meta.outputs.python_version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ steps.meta.outputs.python_version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv

    - name: Check GitHub CLI
      run: |
        if ! command -v gh >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y gh
        fi

    - name: Prepare artifact directory
      run: mkdir -p release-assets

    - name: Create default MQTT bridge archive
      run: |
        tar -czf "release-assets/mqtt-bridge-${{ steps.meta.outputs.version_tag }}.tar.gz" \
          gwn \
          mqtt \
          README.md \
          pyproject.toml \
          uv.lock \
          LICENSE-BSD3.md \
          LICENSE-MPL.md

    - name: Build wheel
      if: ${{ inputs.create_wheel }}
      run: |
        uv build --wheel
        cp dist/*.whl release-assets/

    - name: Create Home Assistant integration archive
      if: ${{ inputs.zip_ha_integration }}
      run: |
        tar -czf "release-assets/homeassistant-integration-${{ steps.meta.outputs.version_tag }}.tar.gz" \
          gwn \
          custom_components \
          pyproject.toml \
          uv.lock \
          README.md \
          LICENSE-BSD3.md \
          LICENSE-MPL.md

    - name: List generated artifacts
      run: ls -lah release-assets

    - name: Create GitHub release
      if: ${{ inputs.publish_release }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh release view "${{ steps.meta.outputs.version_tag }}" >/dev/null 2>&1; then
          if [ "${{ inputs.allow_overwrite }}" = "true" ]; then
            gh release edit "${{ steps.meta.outputs.version_tag }}" \
              --title "${{ steps.meta.outputs.version_tag }}" \
              --notes "${{ inputs.release_info }}"

            gh release view "${{ steps.meta.outputs.version_tag }}" --json assets --jq '.assets[].name' |
            while read -r asset; do
              gh release delete-asset "${{ steps.meta.outputs.version_tag }}" "$asset" --yes
            done

            gh release upload "${{ steps.meta.outputs.version_tag }}" release-assets/*
          else
            echo "Release ${{ steps.meta.outputs.version_tag }} already exists"
            exit 1
          fi
        else
          gh release create "${{ steps.meta.outputs.version_tag }}" \
            --title "${{ steps.meta.outputs.version_tag }}" \
            --notes "${{ inputs.release_info }}" \
            release-assets/*
        fi
