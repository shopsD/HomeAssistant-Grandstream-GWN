name: docker-publish

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag to associate with this build"
        required: true
        type: string
      release_tag:
        description: "GitHub release tag to associate artifacts with"
        required: true
        type: string
      version:
        description: "Application version to write into workspace metadata before building"
        required: true
        type: string
      push_image:
        description: "Push image to GHCR"
        required: true
        default: true
        type: boolean
      publish_latest:
        description: "Publishes the image with a latest tag"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    name: docker-publish
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply version override to workspace metadata
        uses: ./.github/actions/apply-version
        with:
          version: ${{ inputs.version }}

      - name: Load project metadata
        id: meta
        run: |
          APP_VERSION="$(python -c 'from meta_data.project_meta import APP_VERSION; print(APP_VERSION)')"
          VERSION_TAG="${{ inputs.tag }}"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalise image name
        id: image
        run: |
          echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set Tags
        id: vars
        run: |
          IMAGE_NAME="${{ steps.image.outputs.name }}"
          VERSION_TAG="${{ steps.meta.outputs.version_tag }}"
          TAGS="${IMAGE_NAME}:${VERSION_TAG}"
          if [ "${{ inputs.publish_latest }}" = "true" ]; then
            TAGS="${TAGS},${{ steps.image.outputs.name }}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Authenticate
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ inputs.push_image }}
          tags: ${{ steps.vars.outputs.tags }}
