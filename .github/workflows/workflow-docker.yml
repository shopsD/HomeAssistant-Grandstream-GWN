name: docker-publish

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR"
        required: true
        default: true
        type: boolean
      image_tag:
        description: "Optional explicit image tag"
        required: false
        type: string
      publish_latest:
        description: "Publishes the image with a latest tag"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalise image name
        id: image
        run: |
          echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set Tags
        id: vars
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            BASE_TAG="${{ inputs.image_tag }}"
          else
            BASE_TAG="manual-${GITHUB_SHA::7}"
          fi

          TAGS="${{ steps.image.outputs.name }}:${BASE_TAG}"
          if [ "${{ inputs.publish_latest }}" = "true" ]; then
            TAGS="${TAGS},${{ steps.image.outputs.name }}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Authenticate
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ inputs.push_image }}
          tags: ${{ steps.vars.outputs.tags }}
